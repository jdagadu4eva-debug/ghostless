# Ghostless — Cloudflare Pages + Workers configuration
# Deploy with: wrangler pages deploy public --project-name ghostless
# Or as a pure Worker: wrangler deploy

name = "ghostless"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Override the default model if desired (no secret required).
GHOSTLESS_MODEL = "claude-sonnet-4-6"

# -----------------------------------------------------------------------
# REQUIRED SECRET — run once after first deploy:
#   wrangler secret put ANTHROPIC_API_KEY
# -----------------------------------------------------------------------

# For Cloudflare Pages (recommended — static assets served from CDN):
# 1. Connect your GitHub repo in the Pages dashboard
# 2. Build command: (none)
# 3. Output directory: public
# 4. Attach this Worker as a Pages Function via wrangler.toml [functions]
#    OR just add an _worker.js shim (see README).
