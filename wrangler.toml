# Ghostless — Cloudflare Pages configuration
# Static assets: /public
# Worker backend: /functions/_worker.js  (Pages Advanced Mode Worker)

name = "ghostless"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
GHOSTLESS_MODEL = "claude-sonnet-4-6"

# Set the API key secret via the Cloudflare Pages dashboard:
#   Settings → Environment Variables → Add variable (encrypted)
#   Name: ANTHROPIC_API_KEY
